<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff5500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100vh; }
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 150px; }

        /* Поиск */
        .search-box { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        #scInput { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; }
        
        /* Виджет (Скрытый) */
        #sc-wrapper { position: absolute; top: -1000px; left: -1000px; visibility: hidden; }

        /* Список */
        .track-item { display: flex; align-items: center; padding: 12px; background: #0c0c0c; border-radius: 14px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .track-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; background: #222; }
        .track-info { flex: 1; overflow: hidden; }
        .t-name { font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .t-artist { opacity: 0.5; font-size: 12px; margin-top: 2px; }

        /* Плеер */
        .full-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom); }
        .full-player.active { display: flex; animation: slideUp 0.3s ease; }
        .fp-cover { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .fp-cover img { max-width: 100%; max-height: 80%; aspect-ratio: 1/1; border-radius: 20px; box-shadow: 0 10px 50px rgba(255,85,0,0.2); }

        .prog-bg { width: 100%; height: 4px; background: #222; border-radius: 2px; margin-bottom: 40px; }
        #prog-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.2s; }

        .controls { display: flex; align-items: center; justify-content: space-around; padding-bottom: 40px; }
        .play-main { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sc-wrapper">
    <iframe id="sc-player" src="https://w.soundcloud.com/player/?url=https://api.soundcloud.com/tracks/293" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"></iframe>
</div>

<div class="app">
    <div class="page">
        <h1 style="color: var(--accent); font-size: 32px; margin-bottom: 5px;">Notti</h1>
        <div class="search-box">
            <input type="text" id="scInput" placeholder="Введите название или ссылку...">
        </div>
        <div id="list"></div>
    </div>

    <div class="full-player" id="ui">
        <div onclick="toggleUI(false)" style="padding:20px 0;"><i class="fas fa-chevron-down" style="font-size:26px;"></i></div>
        <div class="fp-cover"><img id="f-img" src=""></div>
        <div style="text-align:center; margin-bottom:20px;">
            <h2 id="f-title" style="margin:0;"></h2>
            <p id="f-artist" style="opacity:0.5; margin:10px 0;"></p>
        </div>
        <div class="prog-bg"><div id="prog-fill"></div></div>
        <div class="controls">
            <i class="fas fa-step-backward" onclick="skip(-1)" style="font-size:30px;"></i>
            <div class="play-main" onclick="toggle()"><i id="p-icon" class="fas fa-play"></i></div>
            <i class="fas fa-step-forward" onclick="skip(1)" style="font-size:30px;"></i>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const widget = SC.Widget('sc-player');
    const input = document.getElementById('scInput');
    let isPlaying = false;

    // Прямой поиск через публичный API SoundCloud (без ключей, через oEmbed)
    async function quickSearch(q) {
        if (!q) return;
        const list = document.getElementById('list');
        list.innerHTML = '<p style="text-align:center; opacity:0.5;">Ищем...</p>';

        try {
            // Используем v2 API с твоим Client ID, но с обработкой CORS через прокси или альтернативный метод
            const cid = '1IzwHiVxAHeYKAMqN0IIGD3ZARgJy2kl';
            const r = await fetch(`https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(q)}&client_id=${cid}&limit=10`);
            const d = await r.json();
            
            if (!d.collection) throw new Error();

            list.innerHTML = d.collection.map((t, i) => `
                <div class="track-item" onclick="loadTrack('${t.permalink_url}', '${t.title}', '${t.user.username}', '${(t.artwork_url || t.user.avatar_url || '').replace('large', 't500x500')}')">
                    <img src="${t.artwork_url || t.user.avatar_url}">
                    <div class="track-info">
                        <div class="t-name">${t.title}</div>
                        <div class="t-artist">${t.user.username}</div>
                    </div>
                    <i class="fas fa-play-circle" style="color:var(--accent); font-size:22px;"></i>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = '<p style="text-align:center; color:red;">Ошибка. Попробуйте включить VPN или другое слово.</p>';
        }
    }

    function loadTrack(url, title, artist, img) {
        document.getElementById('f-title').innerText = title;
        document.getElementById('f-artist').innerText = artist;
        document.getElementById('f-img').src = img;
        
        widget.load(url, { auto_play: true, hide_related: true });
        isPlaying = true;
        updateIcon();
        toggleUI(true);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function toggle() {
        widget.toggle();
        isPlaying = !isPlaying;
        updateIcon();
    }

    function updateIcon() {
        document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    function toggleUI(s) { document.getElementById('ui').classList.toggle('active', s); }

    input.onkeypress = (e) => {
        if(e.key === 'Enter') { quickSearch(e.target.value); e.target.blur(); }
    };

    widget.bind(SC.Widget.Events.PLAY, () => { isPlaying = true; updateIcon(); });
    widget.bind(SC.Widget.Events.PAUSE, () => { isPlaying = false; updateIcon(); });
    widget.bind(SC.Widget.Events.PLAY_PROGRESS, (p) => {
        document.getElementById('prog-fill').style.width = (p.relativePosition * 100) + '%';
    });

    window.onload = () => { 
        tg.expand();
        quickSearch('OG Buda'); 
    };
</script>
</body>
</html>
