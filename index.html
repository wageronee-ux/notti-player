<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Ultimate Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #ff5500; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .app { display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        .search-box { margin-bottom: 20px; position: sticky; top: 0; z-index: 10; background: var(--bg); }
        #scInput { width: 100%; padding: 18px; border-radius: 15px; border: 2px solid #222; background: #111; color: #fff; font-size: 16px; }
        #scInput:focus { border-color: var(--accent); }

        #list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .track-item { display: flex; align-items: center; padding: 15px; background: #0c0c0c; border-radius: 16px; margin-bottom: 12px; border: 1px solid #1a1a1a; animation: fadeIn 0.3s ease; }
        .track-item img { width: 55px; height: 55px; border-radius: 10px; margin-right: 15px; background: #222; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .t-name { font-weight: bold; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-size: 15px; }
        .t-artist { opacity: 0.5; font-size: 12px; margin-top: 4px; }

        .full-player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 40px 30px; }
        .full-player.active { display: flex; }
        .fp-cover img { width: 100%; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; margin: 30px 0; box-shadow: 0 15px 50px rgba(255,85,0,0.3); }
        
        .prog-bg { width: 100%; height: 5px; background: #222; border-radius: 3px; margin: 30px 0; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.1s linear; }
        
        .controls { display: flex; align-items: center; justify-content: space-around; margin-top: 10px; }
        .play-btn { width: 80px; height: 80px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; transition: 0.2s; }
        .play-btn:active { transform: scale(0.9); }

        #sc-frame { position: absolute; top: -1000px; opacity: 0; pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<iframe id="sc-frame" src="https://w.soundcloud.com/player/?url=https://api.soundcloud.com/tracks/1"></iframe>

<div class="app">
    <h1 style="color: var(--accent); font-size: 32px; letter-spacing: -1px;">Notti Music</h1>
    <div class="search-box">
        <input type="text" id="scInput" placeholder="Вставьте ссылку на трек...">
        <p style="font-size: 11px; opacity: 0.4; margin-top: 8px; text-align: center;">Скопируйте ссылку в приложении SoundCloud и вставьте сюда</p>
    </div>
    <div id="list">
        <p style="text-align:center; opacity:0.3; margin-top:50px; font-size: 14px;">Ожидание ссылки...</p>
    </div>
</div>

<div class="full-player" id="ui">
    <div onclick="toggleUI(false)"><i class="fas fa-chevron-down" style="font-size:28px;"></i></div>
    <div class="fp-cover"><img id="f-img" src=""></div>
    <div style="text-align:center;">
        <h2 id="f-title" style="margin:0; font-size:24px;">Загрузка...</h2>
        <p id="f-artist" style="opacity:0.5; margin:10px 0; font-size:18px;"></p>
    </div>
    <div class="prog-bg"><div id="prog-fill"></div></div>
    <div class="controls">
        <i class="fas fa-step-backward" style="font-size:25px; opacity: 0.5;"></i>
        <div class="play-btn" onclick="togglePlay()"><i id="p-icon" class="fas fa-play"></i></div>
        <i class="fas fa-step-forward" style="font-size:25px; opacity: 0.5;"></i>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const widget = SC.Widget('sc-frame');
    const input = document.getElementById('scInput');
    const list = document.getElementById('list');

    // Функция получения данных трека через oEmbed (JSONP)
    function resolveTrack(url) {
        if (!url.includes('soundcloud.com')) {
            alert("Пожалуйста, вставьте корректную ссылку SoundCloud");
            return;
        }

        list.innerHTML = '<p style="text-align:center;">Анализируем трек...</p>';
        
        // Используем JSONP для обхода CORS
        const script = document.createElement('script');
        script.src = `https://soundcloud.com/oembed?url=${encodeURIComponent(url)}&format=js&callback=onTrackLoaded`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    // Callback для oEmbed
    window.onTrackLoaded = function(data) {
        if (!data) {
            list.innerHTML = '<p style="text-align:center; color:red;">Не удалось загрузить данные трека</p>';
            return;
        }

        const title = data.title;
        const author = data.author_name;
        const thumb = data.thumbnail_url ? data.thumbnail_url.replace('large', 't500x500') : '';
        const trackUrl = input.value;

        list.innerHTML = `
            <div class="track-item" onclick="playTrack('${trackUrl}', '${title.replace(/'/g, "")}', '${author}', '${thumb}')">
                <img src="${data.thumbnail_url}">
                <div class="track-info">
                    <div class="t-name">${title}</div>
                    <div class="t-artist">${author}</div>
                </div>
                <i class="fas fa-play-circle" style="color:var(--accent); font-size:24px;"></i>
            </div>
        `;
        
        // Автоматически открываем плеер
        playTrack(trackUrl, title, author, thumb);
    };

    function playTrack(url, title, author, img) {
        document.getElementById('f-title').innerText = title;
        document.getElementById('f-artist').innerText = author;
        document.getElementById('f-img').src = img || 'https://via.placeholder.com/500/111/fff?text=Notti';
        
        widget.load(url, { auto_play: true, visual: false, show_comments: false });
        toggleUI(true);
        tg.HapticFeedback.notificationOccurred('success');
    }

    function togglePlay() { widget.toggle(); }
    function toggleUI(s) { document.getElementById('ui').style.display = s ? 'flex' : 'none'; }

    input.onkeypress = (e) => {
        if(e.key === 'Enter') {
            resolveTrack(e.target.value);
            e.target.blur();
        }
    };

    // Синхронизация иконок и прогресса
    widget.bind(SC.Widget.Events.READY, () => {
        widget.bind(SC.Widget.Events.PLAY, () => { document.getElementById('p-icon').className = 'fas fa-pause'; });
        widget.bind(SC.Widget.Events.PAUSE, () => { document.getElementById('p-icon').className = 'fas fa-play'; });
        widget.bind(SC.Widget.Events.PLAY_PROGRESS, (p) => {
            document.getElementById('prog-fill').style.width = (p.relativePosition * 100) + '%';
        });
    });

    window.onload = () => { tg.expand(); };
</script>
</body>
</html>
