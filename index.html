<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --gray: #b3b3b3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }

        /* АНИМАЦИИ КНОПОК */
        .btn-anim:active { transform: scale(0.9); transition: 0.1s; }
        .nav-item:active { transform: scale(0.85); }

        /* НАВИГАЦИЯ */
        .page { display: none; height: 100vh; padding: 20px 20px 160px; overflow-y: auto; }
        .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { color: var(--gray); text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 5px; }

        /* ПОИСК И ПЛИТКИ */
        .search-input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #282828; color: #fff; font-size: 16px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .track-card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        .track-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .like-icon { position: absolute; top: 10px; right: 10px; font-size: 20px; color: rgba(255,255,255,0.5); text-shadow: 0 2px 5px #000; }
        .like-icon.active { color: var(--accent); }

        /* БОЛЬШОЙ ПЛЕЕР */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1e1e1e, #000); z-index: 5000; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); padding: 40px 30px; display: flex; flex-direction: column; align-items: center; }
        #full-player.open { top: 0; }
        .fp-close { position: absolute; top: 20px; left: 20px; font-size: 24px; }
        .fp-img { width: 100%; aspect-ratio: 1/1; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin: 40px 0; }
        .fp-info { width: 100%; text-align: left; }
        .fp-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .fp-artist { color: var(--gray); font-size: 18px; }
        
        /* ПЕРЕМОТКА */
        .fp-seek-bar { width: 100%; margin: 30px 0 10px; -webkit-appearance: none; background: #444; height: 4px; border-radius: 2px; }
        .fp-seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; }
        .fp-time { width: 100%; display: flex; justify-content: space-between; font-size: 12px; color: var(--gray); }

        .fp-controls { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .fp-play-btn { width: 70px; height: 70px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; }

        /* МИНИ ПЛЕЕР */
        .mini-player { position: fixed; bottom: 85px; left: 10px; right: 10px; height: 60px; background: #282828; border-radius: 10px; display: none; align-items: center; padding: 0 10px; z-index: 2000; }
        .mini-player img { width: 40px; height: 40px; border-radius: 5px; margin-right: 12px; }

        #yt-engine { position: absolute; top: -1000px; }
    </style>
</head>
<body>

<div id="yt-engine"></div>

<div id="page-search" class="page active">
    <input type="text" id="searchInput" class="search-input" placeholder="Поиск музыки...">
    <div id="grid" class="grid"></div>
</div>

<div id="page-favorites" class="page">
    <h1 style="font-size: 32px; margin-bottom: 20px;">Избранное</h1>
    <div id="fav-grid" class="grid"></div>
</div>

<div id="page-settings" class="page">
    <h1 style="font-size: 32px;">Настройки</h1>
    <p style="color:var(--gray)">Версия 2.0. Плеер готов.</p>
</div>

<div id="full-player">
    <i class="fas fa-chevron-down fp-close btn-anim" onclick="closeFullPlayer()"></i>
    <img id="fp-img" class="fp-img" src="">
    <div class="fp-info">
        <div id="fp-title" class="fp-title">Название трека</div>
        <div id="fp-artist" class="fp-artist">Исполнитель</div>
    </div>
    
    <input type="range" id="seekBar" class="fp-seek-bar" value="0" step="1">
    <div class="fp-time">
        <span id="currentTime">0:00</span>
        <span id="durationTime">0:00</span>
    </div>

    <div class="fp-controls">
        <i class="fas fa-random btn-anim" style="font-size: 20px; color: var(--gray)"></i>
        <i class="fas fa-step-backward btn-anim" style="font-size: 30px;"></i>
        <div class="fp-play-btn btn-anim" onclick="togglePlay()"><i id="fp-play-icon" class="fas fa-play"></i></div>
        <i class="fas fa-step-forward btn-anim" style="font-size: 30px;" onclick="playNext()"></i>
        <i class="fas fa-redo btn-anim" style="font-size: 20px; color: var(--gray)"></i>
    </div>
</div>

<div class="mini-player" id="mini-player" onclick="openFullPlayer()">
    <img id="m-img" src="">
    <div style="flex: 1; overflow: hidden;">
        <div id="m-title" style="font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Трек</div>
        <div id="m-artist" style="font-size: 11px; color: var(--gray);">Артист</div>
    </div>
    <div onclick="event.stopPropagation(); togglePlay()" class="btn-anim" style="padding: 10px;">
        <i id="m-play-icon" class="fas fa-play" style="font-size: 20px;"></i>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('search', this)"><i class="fas fa-search"></i>Поиск</div>
    <div class="nav-item" onclick="showPage('favorites', this)"><i class="fas fa-heart"></i>Избранное</div>
    <div class="nav-item" onclick="showPage('settings', this)"><i class="fas fa-cog"></i>Настройки</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    let ytPlayer, isPlaying = false, currentTrack = null, favorites = JSON.parse(localStorage.getItem('favs') || '[]');

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-engine', {
            height: '0', width: '0',
            events: { 
                'onStateChange': onPlayerStateChange,
                'onReady': () => setInterval(updateSeekBar, 1000)
            }
        });
    }

    // ПОИСК
    async function search(q) {
        if (!q) return;
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&key=${API_KEY}&type=video&maxResults=10`);
        const data = await res.json();
        renderGrid(data.items, 'grid');
    }

    function renderGrid(items, targetId) {
        const grid = document.getElementById(targetId);
        grid.innerHTML = '';
        items.forEach(item => {
            const track = {
                id: item.id.videoId || item.id,
                title: item.snippet.title,
                artist: item.snippet.channelTitle,
                img: item.snippet.thumbnails.high.url
            };
            const isFav = favorites.find(f => f.id === track.id);
            grid.innerHTML += `
                <div class="track-card btn-anim" onclick="playMusic('${track.id}', '${track.title.replace(/'/g,"")}', '${track.artist}', '${track.img}')">
                    <img src="${track.img}">
                    <i class="fas fa-heart like-icon ${isFav?'active':''}" onclick="event.stopPropagation(); toggleFav(this, '${track.id}', '${track.title.replace(/'/g,"")}', '${track.artist}', '${track.img}')"></i>
                    <div style="padding:10px; font-size:12px; font-weight:bold;">${track.title.substring(0,30)}</div>
                </div>`;
        });
    }

    // УПРАВЛЕНИЕ МУЗЫКОЙ
    function playMusic(id, title, artist, img) {
        currentTrack = {id, title, artist, img};
        document.getElementById('mini-player').style.display = 'flex';
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-artist').innerText = artist;
        document.getElementById('m-img').src = img;
        
        document.getElementById('fp-title').innerText = title;
        document.getElementById('fp-artist').innerText = artist;
        document.getElementById('fp-img').src = img;

        ytPlayer.loadVideoById(id);
        isPlaying = true;
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() {
        if (isPlaying) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
        isPlaying = !isPlaying;
        const icon = isPlaying ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play-icon').className = 'fas ' + icon;
        document.getElementById('fp-play-icon').className = 'fas ' + icon;
    }

    function onPlayerStateChange(e) {
        if (e.data === 0) playNext(); // Авто-переключение
    }

    function playNext() {
        if (currentTrack) search(currentTrack.artist + " similar"); 
        tg.HapticFeedback.notificationOccurred('success');
    }

    // ПЕРЕМОТКА
    function updateSeekBar() {
        if (ytPlayer && ytPlayer.getCurrentTime) {
            const cur = ytPlayer.getCurrentTime();
            const dur = ytPlayer.getDuration();
            const seek = document.getElementById('seekBar');
            seek.max = dur;
            seek.value = cur;
            document.getElementById('currentTime').innerText = formatTime(cur);
            document.getElementById('durationTime').innerText = formatTime(dur);
        }
    }

    document.getElementById('seekBar').oninput = function() {
        ytPlayer.seekTo(this.value);
    };

    function formatTime(s) {
        const m = Math.floor(s/60);
        const sec = Math.floor(s%60);
        return m + ":" + (sec < 10 ? '0'+sec : sec);
    }

    // ИЗБРАННОЕ И НАВИГАЦИЯ
    function toggleFav(el, id, title, artist, img) {
        el.classList.toggle('active');
        const idx = favorites.findIndex(f => f.id === id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push({id, title, artist, img});
        localStorage.setItem('favs', JSON.stringify(favorites));
        tg.HapticFeedback.impactOccurred('light');
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(pageId === 'favorites') renderGrid(favorites.map(f => ({id: f.id, snippet: {title: f.title, channelTitle: f.artist, thumbnails: {high: {url: f.img}}}})), 'fav-grid');
    }

    function openFullPlayer() { document.getElementById('full-player').classList.add('open'); }
    function closeFullPlayer() { document.getElementById('full-player').classList.remove('open'); }

    document.getElementById('searchInput').onkeypress = (e) => {
        if (e.key === 'Enter') { search(e.target.value); e.target.blur(); }
    };

    window.onload = () => { tg.expand(); search('Pop Hits 2026'); };
</script>
</body>
</html>
