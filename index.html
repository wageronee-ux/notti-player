<script>
    const tg = window.Telegram.WebApp;
    const KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    
    // Получаем ID пользователя для уникального сохранения данных
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'guest';
    const userKeyFavs = `notti_favs_${userId}`;
    const userKeyHist = `notti_history_${userId}`;

    let player, isPlaying = false, cur = null;
    
    // Загружаем данные конкретного пользователя
    let favs = JSON.parse(localStorage.getItem(userKeyFavs) || '[]');
    let history = JSON.parse(localStorage.getItem(userKeyHist) || '[]');

    function login() {
        document.getElementById('auth-screen').style.display = 'none';
        const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : 'Друг';
        tg.HapticFeedback.notificationOccurred('success');
        console.log("Авторизован как: " + userName);
    }

    // Сохранение данных (вызывать при каждом изменении)
    function syncData() {
        localStorage.setItem(userKeyFavs, JSON.stringify(favs));
        localStorage.setItem(userKeyHist, JSON.stringify(history));
    }

    // Улучшенный поиск: Ищет и треки, и пытается найти артиста
    async function search(q, tid = 'grid') {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&key=${KEY}&type=video&videoCategoryId=10&maxResults=12`);
        const data = await res.json();
        
        // Если это поиск через инпут, добавим "карточку артиста" в начало
        if(tid === 'grid' && data.items.length > 0) {
            const first = data.items[0].snippet;
            renderArtistCard(first.channelTitle, first.thumbnails.high.url);
        }
        
        render(data.items, tid);
    }

    function renderArtistCard(name, img) {
        const g = document.getElementById('grid');
        const card = `
            <div style="grid-column: 1 / -1; display: flex; align-items: center; background: #1db95422; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--accent);">
                <img src="${img}" style="width: 70px; height: 70px; border-radius: 50%; object-fit: cover; margin-right: 15px;">
                <div>
                    <div style="font-size: 10px; text-transform: uppercase; color: var(--accent);">Лучший результат</div>
                    <div style="font-size: 18px; font-weight: bold;">${name}</div>
                    <div style="font-size: 12px; color: var(--gray);">Исполнитель</div>
                </div>
            </div>
        `;
        g.innerHTML = card + g.innerHTML;
    }

    function saveArtist(name, img) {
        if(!history.find(a => a.name === name)) {
            history.unshift({name, img});
            if(history.length > 10) history.pop();
            syncData(); // Сохраняем в профиль пользователя
            renderArtists();
        }
    }

    function toggleCurrentFav() {
        if(!cur) return;
        const idx = favs.findIndex(f => f.id === cur.id);
        if(idx > -1) {
            favs.splice(idx, 1);
        } else {
            favs.push(cur);
        }
        syncData(); // Сохраняем в профиль пользователя
        
        const isF = favs.find(f => f.id === cur.id);
        const btn = document.getElementById('fp-like-main');
        btn.className = isF ? 'fas fa-heart' : 'far fa-heart';
        btn.style.color = isF ? 'var(--accent)' : '#fff';
        tg.HapticFeedback.impactOccurred('light');
    }

    // Остальные функции (play, togglePlay, showP) остаются без изменений, 
    // так как они уже используют глобальные переменные favs и history,
    // которые мы теперь привязали к Telegram ID при загрузке.

    window.onload = () => {
        tg.expand();
        // Если пользователь уже заходил, можно скрыть экран входа сразу
        if (tg.initDataUnsafe.user) {
            // document.getElementById('auth-screen').style.display = 'none'; // Раскомментируй, если хочешь авто-вход
        }
        renderArtists();
        search('Top ru charts 2026', 'home-grid');
    };
</script>
