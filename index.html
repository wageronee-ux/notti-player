<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Ultimate + Albums</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, sans-serif;
        }

        .app { display: flex; flex-direction: column; height: 100vh; position: relative; }
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 120px; display: none; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; }

        /* Профиль артиста */
        .artist-view {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: none; flex-direction: column; overflow-y: auto; padding-bottom: 120px;
        }
        .artist-view.active { display: flex; }
        .artist-header { height: 280px; position: relative; display: flex; align-items: flex-end; padding: 25px; }
        .artist-header img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        /* Стили Альбомов */
        .album-grid { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .album-grid::-webkit-scrollbar { display: none; }
        .album-card { min-width: 140px; cursor: pointer; }
        .album-card img { width: 140px; height: 140px; border-radius: 8px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .album-card div { font-size: 13px; font-weight: bold; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card span { font-size: 11px; opacity: 0.5; }

        /* Настройки и Плеер (без изменений) */
        .auth-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-btn { width: 100%; max-width: 280px; padding: 15px; border-radius: 30px; border: none; margin-bottom: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google { background: white; color: black; }
        .btn-tg { background: #24A1DE; color: white; }

        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px; }
        .switch { width: 40px; height: 20px; background: #444; border-radius: 20px; position: relative; }
        .switch.on { background: var(--accent); }
        .switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .switch.on::after { left: 22px; }

        .mini-player { position: fixed; bottom: 80px; left: 10px; right: 10px; height: 60px; background: var(--accent); border-radius: 12px; display: none; align-items: center; padding: 0 12px; z-index: 500; color: #000; }
        .full-player { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; flex-direction: column; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom); }
        .full-player.active { display: flex; }
        .cover-wrapper { width: 100%; height: 40vh; display: flex; justify-content: center; align-items: center; min-height: 0; }
        .cover-wrapper img { max-width: 100%; max-height: 100%; border-radius: 12px; object-fit: contain; }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #1a1a1a; display: flex; z-index: 1000; }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; }
        nav div.active { opacity: 1; color: var(--accent); }
        nav i { font-size: 22px; margin-bottom: 4px; }
        #yt-player { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="auth-screen" id="auth-screen">
    <h1 style="font-size: 40px; margin-bottom: 10px;">Notti</h1>
    <button class="auth-btn btn-google" onclick="login('Google')"><i class="fab fa-google"></i> Вход через Google</button>
    <button class="auth-btn btn-tg" onclick="login('Telegram')"><i class="fab fa-telegram"></i> Вход через Telegram</button>
</div>

<div class="app">
    <div id="p-home" class="page active">
        <h2>Артисты</h2>
        <div style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px;" id="artists-list"></div>
        <h2>Поиск</h2>
        <input type="text" id="s-input" placeholder="Треки или альбомы..." style="width:100%; padding:14px; background:#111; border:none; border-radius:10px; color:#fff; outline:none;">
        <div id="res" style="margin-top: 20px;"></div>
    </div>

    <div id="p-settings" class="page">
        <h2>Настройки</h2>
        <div class="setting-item"><span>Качество звука</span><div class="switch on"></div></div>
        <div class="setting-item"><span>Эквалайзер</span><div class="switch"></div></div>
        <button onclick="logout()" style="width: 100%; padding: 15px; background: #ff3b30; border: none; border-radius: 12px; color: white; font-weight: bold; margin-top: 20px;">Выйти</button>
    </div>

    <div class="artist-view" id="artist-view">
        <div class="artist-header">
            <img id="ah-img" src="">
            <i class="fas fa-arrow-left" style="position:absolute; top:50px; left:20px; z-index:10;" onclick="closeArtist()"></i>
            <h1 id="ah-name" style="position:relative; font-size:42px; margin:0; text-shadow: 0 4px 10px rgba(0,0,0,0.5);"></h1>
        </div>
        <div style="padding: 20px;">
            <h3>Альбомы и выпуски</h3>
            <div class="album-grid" id="album-list"></div>
            <h3>Популярные треки</h3>
            <div id="artist-tracks"></div>
        </div>
    </div>

    <div class="mini-player" id="mini" onclick="setFull(true)">
        <img id="m-img" src="">
        <div id="m-txt" style="flex:1; margin-left:12px; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
        <i id="m-btn" class="fas fa-play" style="font-size:22px; padding:10px;" onclick="event.stopPropagation(); toggle();"></i>
    </div>

    <div class="full-player" id="full">
        <div style="padding:20px 0;" onclick="setFull(false)"><i class="fas fa-chevron-down"></i></div>
        <div class="cover-wrapper"><img id="f-img" src=""></div>
        <div style="text-align:center; padding:20px 0;"><h2 id="f-title"></h2><p id="f-art"></p></div>
        <div style="display:flex; align-items:center; justify-content:center; gap:40px; flex:1;">
            <i class="fas fa-step-backward" onclick="prev()"></i>
            <div style="width:70px; height:70px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px;" onclick="toggle()"><i id="f-btn" class="fas fa-play"></i></div>
            <i class="fas fa-step-forward" onclick="next()"></i>
        </div>
    </div>

    <nav>
        <div class="active" onclick="tab('p-home', this)"><i class="fas fa-home"></i>Обзор</div>
        <div onclick="tab('p-settings', this)"><i class="fas fa-cog"></i>Настройки</div>
    </nav>
</div>

<script>
    let player, playlist = [], cur = -1;
    const artistsData = [
        { name: "Платина", img: "https://i.scdn.co/image/ab6761610000e5ebc18600d58852655a6d573512" },
        { name: "Friendly Thug 52", img: "https://i.scdn.co/image/ab6761610000e5eb559810775d799988a87c5305" },
        { name: "OG Buda", img: "https://i.scdn.co/image/ab6761610000e5eb9875f5436c9443586a345a98" }
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', { events: { 'onStateChange': (e) => {
            const isP = e.data === 1;
            document.getElementById('m-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
            document.getElementById('f-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
        }}});
    }

    function renderArtists() {
        document.getElementById('artists-list').innerHTML = artistsData.map(a => `
            <div onclick="openArtist('${a.name}', '${a.img}')" style="min-width:100px; text-align:center;">
                <img src="${a.img}" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
                <p style="font-size:12px; margin-top:8px;">${a.name}</p>
            </div>
        `).join('');
    }

    async function openArtist(name, img) {
        document.getElementById('ah-img').src = img;
        document.getElementById('ah-name').innerText = name;
        document.getElementById('artist-view').classList.add('active');
        
        // Имитация Альбомов
        const albums = ["Sosa Muzik", "Lambo Urban", "Cristal & MOЁT", "Legendary"];
        document.getElementById('album-list').innerHTML = albums.map(alb => `
            <div class="album-card" onclick="search('${name} ${alb}')">
                <img src="${img}">
                <div>${alb}</div>
                <span>Альбом • 2024</span>
            </div>
        `).join('');

        const r = await fetch(`/api/search?q=${encodeURIComponent(name + " Official Audio")}`);
        const d = await r.json();
        document.getElementById('artist-tracks').innerHTML = d.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:12px;" onclick="playlist=JSON.parse('${JSON.stringify(d).replace(/'/g, "\\'")}'); play(${i})">
                <img src="${t.img}" style="width:48px; height:48px; border-radius:6px; margin-right:12px;">
                <div><div style="font-weight:bold;">${t.title}</div><div style="opacity:0.5; font-size:12px;">${t.artist}</div></div>
            </div>
        `).join('');
    }

    function closeArtist() { document.getElementById('artist-view').classList.remove('active'); }
    function login(type) { localStorage.setItem('user_logged', 'true'); document.getElementById('auth-screen').style.display = 'none'; }
    function logout() { localStorage.removeItem('user_logged'); location.reload(); }

    async function search(q) {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q + " Official")}`);
        const d = await r.json(); playlist = d;
        document.getElementById('res').innerHTML = d.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:12px;" onclick="play(${i})">
                <img src="${t.img}" style="width:48px; height:48px; border-radius:6px; object-fit:cover; margin-right:12px;">
                <div style="overflow:hidden;"><div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">${t.title}</div><div style="opacity:0.5; font-size:12px;">${t.artist}</div></div>
            </div>
        `).join('');
    }

    function play(i) {
        cur = i; const t = playlist[i];
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-img').src = t.img;
        document.getElementById('f-img').src = t.img;
        document.getElementById('m-txt').innerText = t.title;
        document.getElementById('f-title').innerText = t.title;
        document.getElementById('f-art').innerText = t.artist;
        player.loadVideoById(t.id); player.playVideo();
    }

    function toggle() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
    function setFull(s) { document.getElementById('full').classList.toggle('active', s); }
    function tab(p, e) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav div').forEach(x => x.classList.remove('active'));
        e.classList.add('active');
    }

    document.getElementById('s-input').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };
    window.onload = () => { if(localStorage.getItem('user_logged')) document.getElementById('auth-screen').style.display = 'none'; renderArtists(); };
    function next() { if(cur < playlist.length - 1) play(cur + 1); }
    function prev() { if(cur > 0) play(cur - 1); }
</script>
</body>
</html>
