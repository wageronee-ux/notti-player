<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOTTI ULTIMATE 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --gray: #b3b3b3; --player-bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background-color: #000 !important; margin: 0; padding: 0; color: #fff; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; height: 100vh; overflow: hidden; }

        /* ЭКРАН ВХОДА - ЖИРНЫЙ */
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: 0.5s; }
        .auth-logo { font-size: 80px; color: var(--accent); font-weight: 900; text-shadow: 0 0 30px rgba(29, 185, 84, 0.4); margin-bottom: 10px; }
        .auth-btn { background: #fff; color: #000; padding: 20px 60px; border-radius: 40px; border: none; font-weight: 900; font-size: 18px; cursor: pointer; transform: translateY(0); transition: 0.3s; box-shadow: 0 10px 25px rgba(255,255,255,0.1); }
        .auth-btn:active { transform: scale(0.95); background: #eee; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .page { display: none; height: 100vh; padding: 20px 20px 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .wave-card { width: 100%; height: 130px; background: linear-gradient(135deg, #1db954 0%, #0b4a22 100%); border-radius: 25px; display: flex; align-items: center; padding: 25px; margin-bottom: 30px; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(29, 185, 84, 0.2); }
        .wave-bg-icon { position: absolute; right: -20px; bottom: -30px; font-size: 140px; color: rgba(255,255,255,0.07); transform: rotate(-15deg); pointer-events: none; }

        .artists-scroll { display: flex; gap: 18px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; margin-bottom: 10px; }
        .artist-item { min-width: 95px; text-align: center; }
        .artist-item img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #1a1a1a; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .artist-name { font-size: 13px; margin-top: 10px; color: var(--gray); font-weight: 500; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 40px; }
        .track-card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid #222; position: relative; }
        .track-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .track-info { padding: 12px; font-size: 13px; font-weight: 600; line-height: 1.4; min-height: 55px; }

        /* БОЛЬШОЙ ПЛЕЕР - КНОПКИ ВЫШЕ, ФИКС ЖЕСТОВ */
        #full-player { 
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 9000; transition: 0.5s cubic-bezier(0.3, 1, 0.3, 1); 
            padding: env(safe-area-inset-top) 25px 80px; display: flex; flex-direction: column;
            touch-action: none;
        }
        #full-player.open { top: 0; }
        
        .fp-header { display: flex; justify-content: space-between; align-items: center; height: 60px; margin-top: 10px; }
        .fp-btn { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 50%; font-size: 20px; }

        .fp-img-container { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
        .fp-img { width: 85%; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,1); transition: transform 0.4s; }
        .fp-img.playing { transform: scale(1.05); }

        .controls-area { width: 100%; padding-bottom: 120px; } /* Кнопки подняты высоко */
        .fp-title-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        
        #seek { width: 100%; accent-color: var(--accent); height: 5px; border-radius: 10px; cursor: pointer; }
        .time-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-top: 12px; font-variant-numeric: tabular-nums; font-weight: 500; }

        .main-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .play-pause-btn { width: 85px; height: 85px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* ОЧЕРЕДЬ */
        #queue-menu { position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%; background: #111; border-radius: 35px 35px 0 0; transition: 0.4s; z-index: 9500; padding: 30px; overflow-y: auto; border-top: 1px solid #222; touch-action: pan-y; }
        #queue-menu.open { bottom: 0; }
        .q-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; animation: fadeIn 0.3s ease; }
        .q-item img { width: 55px; height: 55px; border-radius: 10px; margin-right: 18px; }

        /* МИНИ ПЛЕЕР */
        #mini-player { position: fixed; bottom: 100px; left: 12px; right: 12px; height: 70px; background: rgba(18,18,18,0.95); backdrop-filter: blur(25px); border-radius: 20px; display: none; align-items: center; padding: 0 15px; z-index: 8000; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #mini-player img { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; object-fit: cover; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.98); display: flex; justify-content: space-around; padding: 15px 0 40px; z-index: 7000; backdrop-filter: blur(25px); border-top: 1px solid #111; }
        .nav-item { color: var(--gray); text-align: center; font-size: 12px; font-weight: 500; transition: 0.2s; }
        .nav-item.active { color: var(--accent); }

        /* СКРЫТЫЙ НО АКТИВНЫЙ ПЛЕЕР ДЛЯ ФОНА */
        #yt-engine-container { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.001; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-logo">Notti</div>
    <div style="color: var(--gray); font-size: 18px; margin-bottom: 30px; font-weight: 500;">Музыка Будущего 2026</div>
    <button class="auth-btn" onclick="login()">ВОЙТИ В ПРИЛОЖЕНИЕ</button>
</div>

<div id="yt-engine-container"><div id="yt-engine"></div></div>

<div id="page-home" class="page active">
    <h1 style="font-size: 32px; letter-spacing: -1px; margin-bottom: 25px;">Для тебя</h1>
    
    <div class="wave-card" onclick="search('Топ 100 хитов 2026 Россия', 'home-grid')">
        <i class="fas fa-play-circle" style="font-size:40px; z-index:2;"></i>
        <div style="margin-left:20px; z-index:2;">
            <div style="font-weight:900; font-size:24px;">Хиты РУ 2026</div>
            <div style="font-size:13px; opacity:0.8; font-weight:500;">Обновлено сегодня • Notti Mix</div>
        </div>
        <i class="fas fa-compact-disc wave-bg-icon"></i>
    </div>

    <h3 style="font-size: 20px;">Твои артисты</h3>
    <div id="artists-list" class="artists-scroll"></div>

    <h3 style="font-size: 20px; margin-top: 30px;">Популярно сейчас</h3>
    <div id="ru-hits" class="grid"></div>

    <h3 style="font-size: 20px;">Рекомендации</h3>
    <div id="home-grid" class="grid"></div>
</div>

<div id="page-search" class="page">
    <div style="position: sticky; top:0; background:#000; padding: 10px 0; z-index:100;">
        <input type="text" id="searchInput" style="width:100%; padding:20px 25px; border-radius:20px; background:#161616; color:#fff; border:1px solid #222; font-size: 17px; font-weight: 500;" placeholder="Поиск музыки и артистов...">
    </div>
    <div id="grid" class="grid" style="margin-top:20px;"></div>
</div>

<div id="page-favs" class="page">
    <h1 style="font-size: 32px;">Медиатека</h1>
    <div id="fav-grid" class="grid"></div>
</div>

<div id="full-player">
    <div class="fp-header">
        <div class="fp-btn" onclick="closeFull()"><i class="fas fa-chevron-down"></i></div>
        <div style="font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--gray);">NOTTI PREMIUM</div>
        <div class="fp-btn" onclick="toggleQueue()"><i class="fas fa-indent"></i></div>
    </div>

    <div class="fp-img-container">
        <img id="fp-img" class="fp-img" src="">
    </div>

    <div class="controls-area">
        <div class="fp-title-row">
            <div style="overflow:hidden; flex:1; margin-right: 15px;">
                <div id="fp-title" style="font-size:28px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Загрузка...</div>
                <div id="fp-artist" style="color:var(--gray); font-size:19px; margin-top:5px; font-weight:500;">Артист</div>
            </div>
            <i id="fp-like-main" class="far fa-heart" style="font-size:30px;" onclick="toggleCurrentFav()"></i>
        </div>

        <input type="range" id="seek" value="0">
        <div class="time-row">
            <span id="curT">0:00</span><span id="durT">0:00</span>
        </div>

        <div class="main-controls">
            <i class="fas fa-random" style="font-size:22px; color:var(--gray);"></i>
            <i class="fas fa-step-backward" style="font-size:38px;" onclick="playPrev()"></i>
            <div class="play-pause-btn" onclick="togglePlay()">
                <i id="fp-play" class="fas fa-play"></i>
            </div>
            <i class="fas fa-step-forward" style="font-size:38px;" onclick="playNext()"></i>
            <i class="fas fa-redo-alt" style="font-size:22px; color:var(--gray);"></i>
        </div>
    </div>

    <div id="queue-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size: 24px;">Очередь</h2>
            <i class="fas fa-times-circle" style="font-size:28px; color:#333;" onclick="toggleQueue()"></i>
        </div>
        <div id="queue-list"></div>
    </div>
</div>

<div id="mini-player" onclick="openFull()">
    <img id="m-img" src="">
    <div style="flex:1; overflow:hidden;"><div id="m-title" style="font-weight:800; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div></div>
    <i id="m-play" class="fas fa-play" style="padding:15px; font-size:20px;" onclick="event.stopPropagation(); togglePlay()"></i>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showP('home', this)"><i class="fas fa-home" style="font-size:22px;"></i><br>Главная</div>
    <div class="nav-item" onclick="showP('search', this)"><i class="fas fa-search" style="font-size:22px;"></i><br>Поиск</div>
    <div class="nav-item" onclick="showP('favs', this)"><i class="fas fa-heart" style="font-size:22px;"></i><br>Любимые</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    const KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    
    let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'guest';
    const sKeyFavs = `notti_favs_${userId}`, sKeyHist = `notti_hist_${userId}`;
    
    let player, isPlaying = false, cur = null;
    let favs = JSON.parse(localStorage.getItem(sKeyFavs) || '[]');
    let history = JSON.parse(localStorage.getItem(sKeyHist) || '[]');
    let queue = [], historyQueue = [];

    function login() { 
        document.getElementById('auth-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('auth-screen').style.display = 'none', 500);
        tg.expand();
        tg.HapticFeedback.notificationOccurred('success');
        search('Русские новинки 2026', 'ru-hits');
        search('2026 New Hits World', 'home-grid');
    }

    // НАСТРОЙКА ПЛЕЕРА ДЛЯ ФОНОВОГО РЕЖИМА
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', {
            height: '1', width: '1',
            playerVars: { 
                'autoplay': 1, 'playsinline': 1, 'controls': 0, 
                'disablekb': 1, 'fs': 0, 'modestbranding': 1 
            },
            events: { 
                'onStateChange': (e) => { 
                    if(e.data == YT.PlayerState.ENDED) playNext();
                    isPlaying = (e.data == YT.PlayerState.PLAYING);
                    updateBtns();
                    // Чтобы мобильные браузеры не "засыпали"
                    if (isPlaying) { navigator.mediaSession.playbackState = 'playing'; }
                },
                'onReady': () => {
                    setInterval(updateUI, 1000);
                    // Инициализация медиа-сессии браузера
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.setActionHandler('play', togglePlay);
                        navigator.mediaSession.setActionHandler('pause', togglePlay);
                        navigator.mediaSession.setActionHandler('nexttrack', playNext);
                        navigator.mediaSession.setActionHandler('previoustrack', playPrev);
                    }
                }
            }
        });
    }

    async function search(q, tid) {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&key=${KEY}&type=video&videoCategoryId=10&maxResults=20`);
            const data = await res.json();
            const g = document.getElementById(tid); if(!g) return;
            g.innerHTML = '';
            data.items.forEach(i => {
                const t = { id: i.id.videoId, title: i.snippet.title, art: i.snippet.channelTitle, img: i.snippet.thumbnails.high.url };
                g.innerHTML += `<div class="track-card" onclick="play('${t.id}','${t.title.replace(/'/g,"")}','${t.art}','${t.img}')">
                    <img src="${t.img}"><div class="track-info">${t.title}</div></div>`;
            });
            if(tid === 'grid') {
                queue = data.items.map(i => ({id: i.id.videoId, title: i.snippet.title, art: i.snippet.channelTitle, img: i.snippet.thumbnails.high.url}));
                renderQueue();
            }
        } catch(e) { console.error("YT API Error"); }
    }

    function play(id, title, art, img) {
        if(cur && cur.id !== id) historyQueue.push(cur);
        cur = {id, title, art, img};
        
        document.getElementById('mini-player').style.display = 'flex';
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = img;
        document.getElementById('fp-title').innerText = title;
        document.getElementById('fp-artist').innerText = art;
        document.getElementById('fp-img').src = img;
        document.getElementById('fp-img').classList.add('playing');
        
        player.loadVideoById(id);
        saveHistory(art, img);
        updateLikeBtn();

        // Обновляем данные для фонового плеера системы
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title, artist: art, artwork: [{ src: img, sizes: '512x512', type: 'image/jpg' }]
            });
        }
    }

    function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
    function updateBtns() {
        const icon = isPlaying ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play').className = 'fas ' + icon;
        document.getElementById('fp-play').className = 'fas ' + icon;
        if(!isPlaying) document.getElementById('fp-img').classList.remove('playing');
        else document.getElementById('fp-img').classList.add('playing');
    }

    function playNext() {
        if(queue.length > 0) {
            let next = queue.shift();
            play(next.id, next.title, next.art, next.img);
            renderQueue();
        } else { search(cur ? cur.art : "Top 2026", 'home-grid'); }
        tg.HapticFeedback.impactOccurred('medium');
    }

    function playPrev() {
        if(historyQueue.length > 0) play(historyQueue.pop().id, "...", "...", "...");
        else player.seekTo(0);
        tg.HapticFeedback.impactOccurred('soft');
    }

    function updateUI() {
        if(player && player.getCurrentTime) {
            const c = player.getCurrentTime(), d = player.getDuration();
            const sk = document.getElementById('seek');
            sk.max = d || 100; sk.value = c;
            document.getElementById('curT').innerText = fmt(c);
            document.getElementById('durT').innerText = fmt(d);
        }
    }

    function fmt(s) { let m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+(r<10?'0'+r:r); }

    function saveHistory(name, img) {
        history = history.filter(a => a.name !== name);
        history.unshift({name, img});
        localStorage.setItem(sKeyHist, JSON.stringify(history.slice(0,15)));
        renderArtists();
    }

    function renderArtists() {
        const l = document.getElementById('artists-list'); if(!l) return;
        l.innerHTML = '';
        history.forEach(a => {
            l.innerHTML += `<div class="artist-item" onclick="search('${a.name}','grid'); showP('search', document.querySelectorAll('.nav-item')[1])"><img src="${a.img}"><div class="artist-name">${a.name}</div></div>`;
        });
    }

    function updateLikeBtn() {
        const isF = favs.find(f => f.id === cur?.id);
        const btn = document.getElementById('fp-like-main');
        btn.className = isF ? 'fas fa-heart' : 'far fa-heart';
        btn.style.color = isF ? 'var(--accent)' : '#fff';
    }

    function toggleCurrentFav() {
        if(!cur) return;
        const idx = favs.findIndex(f => f.id === cur.id);
        if(idx > -1) favs.splice(idx,1); else favs.push(cur);
        localStorage.setItem(sKeyFavs, JSON.stringify(favs));
        updateLikeBtn();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderQueue() {
        const ql = document.getElementById('queue-list'); ql.innerHTML = '';
        queue.forEach((t, i) => {
            ql.innerHTML += `<div class="q-item" onclick="play('${t.id}','${t.title}','${t.art}','${t.img}'); queue.splice(${i},1); renderQueue(); toggleQueue();">
                <img src="${t.img}"><div><div style="font-size:15px; font-weight:800; width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">${t.title}</div><div style="font-size:12px; color:var(--gray); margin-top:3px;">${t.art}</div></div></div>`;
        });
    }

    function toggleQueue() { document.getElementById('queue-menu').classList.toggle('open'); }

    /* ФИКС ЖЕСТОВ NOTTI ULTIMATE */
    let startX = 0, startY = 0;
    const fp = document.getElementById('full-player');

    fp.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }, {passive: false});

    fp.addEventListener('touchmove', e => {
        const dy = e.touches[0].clientY - startY;
        const dx = e.touches[0].clientX - startX;
        if (Math.abs(dy) > 10 || Math.abs(dx) > 10) e.preventDefault(); 
    }, {passive: false});

    fp.addEventListener('touchend', e => {
        let dx = e.changedTouches[0].clientX - startX;
        let dy = e.changedTouches[0].clientY - startY;
        if(Math.abs(dx) > Math.abs(dy)) {
            if(Math.abs(dx) > 80) dx > 0 ? playPrev() : playNext();
        } else {
            if(dy > 100) closeFull();
        }
    }, {passive: false});

    function openFull() { fp.classList.add('open'); }
    function closeFull() { fp.classList.remove('open'); document.getElementById('queue-menu').classList.remove('open'); }

    function showP(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(p==='favs') renderFavs();
    }

    function renderFavs() {
        const g = document.getElementById('fav-grid'); g.innerHTML = '';
        favs.forEach(t => {
            g.innerHTML += `<div class="track-card" onclick="play('${t.id}','${t.title}','${t.art}','${t.img}')">
                <img src="${t.img}"><div class="track-info">${t.title}</div></div>`;
        });
    }

    document.getElementById('seek').oninput = function() { player.seekTo(this.value); };
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key==='Enter') { search(e.target.value, 'grid'); e.target.blur(); } };
    window.onload = renderArtists;
</script>
</body>
</html>
