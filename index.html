<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Ultra Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #1DB954; --bg: #000; }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100vh; width: 100vw; overflow: hidden; font-family: -apple-system, sans-serif;
        }

        /* Главная обертка */
        .app { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Контент */
        .page { flex: 1; overflow-y: auto; padding: 20px 20px 100px; display: none; }
        .page.active { display: block; }

        /* МИНИ-ПЛЕЕР */
        .mini-player {
            position: fixed; bottom: 80px; left: 10px; right: 10px;
            height: 60px; background: var(--accent); border-radius: 12px;
            display: none; align-items: center; padding: 0 12px; z-index: 500; color: #000;
        }
        .mini-player img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; }

        /* ПОЛНОЭКРАННЫЙ ПЛЕЕР — ЖЕСТКАЯ ФИКСАЦИЯ */
        .full-player {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: none; flex-direction: column; 
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        }
        .full-player.active { display: flex; }

        /* Шапка плеера */
        .fp-header { height: 60px; display: flex; align-items: center; justify-content: flex-start; }

        /* КОНТЕЙНЕР ОБЛОЖКИ — ГЛАВНОЕ ИСПРАВЛЕНИЕ */
        .fp-body {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            min-height: 0; /* Предотвращает раздувание flex-элемента */
        }

        .cover-wrapper {
            width: 100%;
            max-width: 320px; /* Ограничение по ширине */
            height: 40vh;    /* Ограничение по высоте — ровно 40% экрана */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cover-wrapper img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            object-fit: contain; /* Картинка вписывается, а не вылазит */
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* Инфо и кнопки */
        .fp-info { text-align: center; padding: 20px 0; height: 100px; }
        .fp-info h2 { margin: 0; font-size: 22px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fp-info p { margin: 5px 0 0; opacity: 0.6; }

        .fp-controls {
            height: 120px; display: flex; align-items: center; justify-content: center; gap: 40px;
        }
        .btn-play {
            width: 72px; height: 72px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px;
        }

        /* Навигация */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #000; border-top: 1px solid #1a1a1a;
            display: flex; padding-bottom: env(safe-area-inset-bottom);
        }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; }
        nav div.active { opacity: 1; color: var(--accent); }
        nav i { font-size: 22px; margin-bottom: 4px; }

        #yt-player { position: absolute; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="app">
    <div id="p-home" class="page active">
        <h1 style="font-size: 32px; margin-bottom: 20px;">Поиск</h1>
        <input type="text" id="s-input" placeholder="Трек или артист..." style="width:100%; padding:14px; background:#111; border:none; border-radius:10px; color:#fff; outline:none;">
        <div id="res" style="margin-top: 20px;"></div>
    </div>

    <div id="p-fav" class="page"><h1>Любимое</h1><div id="fav-res"></div></div>

    <div class="mini-player" id="mini" onclick="setFull(true)">
        <img id="m-img" src="">
        <div id="m-txt" style="flex:1; margin-left:12px; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
        <i id="m-btn" class="fas fa-play" style="font-size:22px; padding:10px;" onclick="event.stopPropagation(); toggle();"></i>
    </div>

    <div class="full-player" id="full">
        <div class="fp-header" onclick="setFull(false)"><i class="fas fa-chevron-down" style="font-size:24px;"></i></div>
        
        <div class="fp-body">
            <div class="cover-wrapper">
                <img id="f-img" src="">
            </div>
        </div>

        <div class="fp-info">
            <h2 id="f-title">Название</h2>
            <p id="f-art">Исполнитель</p>
        </div>

        <div class="fp-controls">
            <i class="fas fa-step-backward" style="font-size:26px;" onclick="prev()"></i>
            <div class="btn-play" onclick="toggle()"><i id="f-btn" class="fas fa-play"></i></div>
            <i class="fas fa-step-forward" style="font-size:26px;" onclick="next()"></i>
        </div>
    </div>

    <nav>
        <div class="active" onclick="tab('p-home', this)"><i class="fas fa-search"></i>Поиск</div>
        <div onclick="tab('p-fav', this)"><i class="fas fa-heart"></i>Медиатека</div>
    </nav>
</div>

<script>
    let player, playlist = [], cur = -1;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: { 'onStateChange': (e) => {
                const isP = e.data === 1;
                document.getElementById('m-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
                document.getElementById('f-btn').className = isP ? 'fas fa-pause' : 'fas fa-play';
            }}
        });
    }

    async function search(q) {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q + " Official")}`);
        const d = await r.json(); playlist = d;
        document.getElementById('res').innerHTML = d.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:12px;" onclick="play(${i})">
                <img src="${t.img}" style="width:48px; height:48px; border-radius:6px; object-fit:cover; margin-right:12px;">
                <div style="overflow:hidden;"><div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis;">${t.title}</div><div style="opacity:0.5; font-size:12px;">${t.artist}</div></div>
            </div>
        `).join('');
    }

    function play(i) {
        cur = i; const t = playlist[i];
        document.getElementById('mini').style.display = 'flex';
        document.getElementById('m-img').src = t.img;
        document.getElementById('f-img').src = t.img;
        document.getElementById('m-txt').innerText = t.title;
        document.getElementById('f-title').innerText = t.title;
        document.getElementById('f-art').innerText = t.artist;
        player.loadVideoById(t.id); player.playVideo(); player.unMute();
    }

    function toggle() { player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo(); }
    function setFull(s) { document.getElementById('full').classList.toggle('active', s); }
    function tab(p, e) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav div').forEach(x => x.classList.remove('active'));
        e.classList.add('active');
    }
    document.getElementById('s-input').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };
    function next() { if(cur < playlist.length - 1) play(cur + 1); }
    function prev() { if(cur > 0) play(cur - 1); }
</script>
</body>
</html>
