<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #1DB954;
            --bg: #000;
            --panel: #121212;
        }

        body, html {
            background: var(--bg); color: white; margin: 0; padding: 0;
            height: 100%; width: 100%; overflow: hidden; font-family: sans-serif;
        }

        /* Контейнер приложения */
        .app-container { display: flex; flex-direction: column; height: 100vh; position: relative; }

        /* Контентная зона */
        .page { 
            display: none; flex: 1; overflow-y: auto; 
            padding: 20px 20px 100px; -webkit-overflow-scrolling: touch; 
        }
        .page.active { display: block; }

        /* МИНИ-ПЛЕЕР (компактный) */
        .player-mini { 
            position: fixed; bottom: 85px; left: 10px; right: 10px; 
            background: var(--accent); color: black; border-radius: 12px; 
            height: 55px; display: none; align-items: center; z-index: 100;
            padding: 0 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .player-mini img { width: 40px; height: 40px; border-radius: 6px; margin-right: 12px; }

        /* ПОЛНОЭКРАННЫЙ ПЛЕЕР (ИСПРАВЛЕННЫЙ) */
        .player-full {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: none; flex-direction: column;
            padding: env(safe-area-inset-top) 30px env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        .player-full.active { display: flex; animation: slideUp 0.3s ease-out; }

        .close-area { padding: 20px 0; font-size: 24px; cursor: pointer; opacity: 0.7; }

        /* Центрирование обложки, чтобы она не вылазила */
        .cover-box {
            flex: 1; display: flex; align-items: center; justify-content: center;
            min-height: 0; /* Важно для flex-контейнеров */
        }
        .cover-box img {
            max-width: 100%; max-height: 80%; /* Обложка адаптируется под свободное место */
            aspect-ratio: 1/1; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        .track-meta { padding: 20px 0; text-align: center; }
        .track-meta h1 { font-size: 22px; margin: 0 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta p { color: #b3b3b3; margin: 0; font-size: 16px; }

        .controls-box {
            padding: 30px 0 50px; display: flex; align-items: center; justify-content: center; gap: 40px;
        }
        .play-main {
            width: 70px; height: 70px; background: white; color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer;
        }

        /* Навигация */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: #000; border-top: 1px solid #1a1a1a; display: flex; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav div { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; opacity: 0.5; }
        nav div.active { opacity: 1; color: var(--accent); }
        nav i { font-size: 22px; margin-bottom: 4px; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #yt-player { position: absolute; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="yt-player"></div>

<div class="app-container">
    <div id="home" class="page active">
        <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 25px;">Главная</h2>
        <input type="text" id="searchInput" placeholder="Поиск музыки..." style="width:100%; padding:15px; background:#1a1a1a; border:none; border-radius:12px; color:white; font-size:16px; margin-bottom:20px; outline:none;">
        <div id="results"></div>
    </div>

    <div id="favorites" class="page">
        <h2 style="font-size: 28px; font-weight: 800;">Медиатека</h2>
        <div id="favList"></div>
    </div>

    <div class="player-mini" id="miniPlayer" onclick="openFull()">
        <img id="mImg" src="">
        <div style="flex:1; overflow:hidden; font-weight:bold; white-space:nowrap; text-overflow:ellipsis;" id="mTitle"></div>
        <i id="mPlayBtn" class="fas fa-play" style="font-size:20px; padding:10px;" onclick="event.stopPropagation(); togglePlay();"></i>
    </div>

    <div class="player-full" id="fullPlayer">
        <div class="close-area" onclick="closeFull()"><i class="fas fa-chevron-down"></i></div>
        
        <div class="cover-box">
            <img id="fImg" src="">
        </div>

        <div class="track-meta">
            <h1 id="fTitle">Загрузка...</h1>
            <p id="fArtist">Исполнитель</p>
        </div>

        <div class="controls-box">
            <i class="fas fa-step-backward" style="font-size:24px;" onclick="prev()"></i>
            <div class="play-main" onclick="togglePlay()">
                <i id="fPlayBtn" class="fas fa-play"></i>
            </div>
            <i class="fas fa-step-forward" style="font-size:24px;" onclick="next()"></i>
        </div>
    </div>

    <nav>
        <div class="active" onclick="switchPage('home', this)"><i class="fas fa-home"></i>Домой</div>
        <div onclick="switchPage('favorites', this)"><i class="fas fa-heart"></i>Любимое</div>
    </nav>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let player, curIdx = -1, playlist = [];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: {
                'onStateChange': (e) => {
                    const isPlay = e.data === 1;
                    document.getElementById('mPlayBtn').className = isPlay ? 'fas fa-pause' : 'fas fa-play';
                    document.getElementById('fPlayBtn').className = isPlay ? 'fas fa-pause' : 'fas fa-play';
                }
            }
        });
    }

    async function search(q) {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q + " Official Audio")}`);
        const data = await res.json();
        playlist = data;
        document.getElementById('results').innerHTML = data.map((t, i) => `
            <div style="display:flex; align-items:center; margin-bottom:15px;" onclick="play(${i})">
                <img src="${t.img}" style="width:50px; height:50px; border-radius:8px; margin-right:15px;">
                <div style="flex:1; overflow:hidden;">
                    <div style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${t.title}</div>
                    <div style="font-size:12px; opacity:0.5;">${t.artist}</div>
                </div>
            </div>
        `).join('');
    }

    function play(idx) {
        curIdx = idx;
        const t = playlist[idx];
        document.getElementById('miniPlayer').style.display = 'flex';
        
        document.getElementById('mImg').src = t.img;
        document.getElementById('fImg').src = t.img;
        document.getElementById('mTitle').innerText = t.title;
        document.getElementById('fTitle').innerText = t.title;
        document.getElementById('fArtist').innerText = t.artist;

        player.loadVideoById(t.id);
        player.playVideo();
        player.unMute();
    }

    function togglePlay() {
        player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
    }

    function openFull() { document.getElementById('fullPlayer').classList.add('active'); }
    function closeFull() { document.getElementById('fullPlayer').classList.remove('active'); }

    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('searchInput').onkeypress = (e) => { if(e.key === 'Enter') search(e.target.value); };

    function next() { if(curIdx < playlist.length -1) play(curIdx + 1); }
    function prev() { if(curIdx > 0) play(curIdx - 1); }
</script>

</body>
</html>
