<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Fix Max</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #0088cc; --bg: #000; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .search-box { position: sticky; top: 10px; z-index: 100; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #1a1a1a; color: white; font-size: 16px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #222; display: block; }
        .card-info { padding: 8px; font-size: 13px; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Плеер снизу */
        .player-bar { position: fixed; bottom: 15px; left: 10px; right: 10px; height: 65px; background: rgba(30,30,30,0.95); backdrop-filter: blur(10px); border-radius: 15px; display: none; align-items: center; padding: 0 12px; border: 1px solid #333; z-index: 1000; }
        .player-bar img { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; }
        .play-btn { width: 40px; height: 40px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; margin-left: auto; cursor: pointer; }
        
        #yt-player { position: absolute; top: -1000px; left: -1000px; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="yt-player"></div>
<div id="loader" class="loading-overlay"><i class="fas fa-spinner fa-spin fa-2x"></i></div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Введите имя артиста...">
</div>

<div id="grid" class="grid">
    </div>

<div class="player-bar" id="player">
    <img id="p-img" src="">
    <div style="flex:1; overflow:hidden;">
        <div id="p-title" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Песня</div>
        <div id="p-artist" style="font-size:11px; opacity:0.6;">Артист</div>
    </div>
    <div class="play-btn" onclick="togglePlay()"><i id="p-icon" class="fas fa-play"></i></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const YT_KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    let ytPlayer, isPlaying = false;

    // Инициализация плеера YouTube
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('yt-player', {
            height: '1', width: '1',
            playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1 },
            events: { 'onStateChange': (e) => { if(e.data === 1) isPlaying = true; if(e.data === 2) isPlaying = false; updateIcon(); } }
        });
    }

    async function search(query) {
        if(!query) return;
        document.getElementById('loader').style.display = 'flex';
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        try {
            // Ищем видео сразу на YouTube (это гарантирует наличие обложки и самой музыки)
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + ' audio')}&key=${YT_KEY}&type=video&maxResults=10`);
            const data = await res.json();

            if(data.items) {
                data.items.forEach(item => {
                    const videoId = item.id.videoId;
                    const title = item.snippet.title.replace(/&quot;/g, '"');
                    const cover = item.snippet.thumbnails.high.url;
                    const artist = item.snippet.channelTitle;

                    grid.innerHTML += `
                        <div class="card" onclick="playMusic('${videoId}', '${title}', '${artist}', '${cover}')">
                            <img src="${cover}">
                            <div class="card-info">${title}</div>
                        </div>`;
                });
            }
        } catch (e) { alert("Ошибка поиска!"); }
        document.getElementById('loader').style.display = 'none';
    }

    function playMusic(id, title, artist, cover) {
        document.getElementById('player').style.display = 'flex';
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-artist').innerText = artist;
        document.getElementById('p-img').src = cover;

        ytPlayer.loadVideoById(id);
        isPlaying = true;
        updateIcon();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function togglePlay() {
        if (isPlaying) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
        isPlaying = !isPlaying;
        updateIcon();
    }

    function updateIcon() {
        document.getElementById('p-icon').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
    }

    document.getElementById('searchInput').onkeypress = (e) => {
        if(e.key === 'Enter') { search(e.target.value); e.target.blur(); }
    };

    window.onload = () => {
        tg.expand();
        search('Pop Music 2024'); // Начальный экран
    };
</script>
</body>
</html>
