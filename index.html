<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music Premium 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --gray: #b3b3b3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background-color: #000 !important; margin: 0; padding: 0; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* ЭКРАН ВХОДА */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .auth-btn { background: #fff; color: #000; padding: 18px 50px; border-radius: 40px; border: none; font-weight: 900; font-size: 16px; margin-top: 30px; cursor: pointer; letter-spacing: 1px; }

        .page { display: none; height: 100vh; padding: 20px 20px 190px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; }

        /* ИНТЕРФЕЙС ГЛАВНОЙ */
        .wave-card { width: 100%; height: 110px; background: linear-gradient(135deg, #1db954, #004d1a); border-radius: 20px; display: flex; align-items: center; padding: 20px; margin-bottom: 25px; cursor: pointer; position: relative; overflow: hidden; }
        .wave-bg { position: absolute; right: -10px; bottom: -20px; font-size: 110px; color: rgba(255,255,255,0.06); transform: rotate(-12deg); }

        .artists-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .artist-item { min-width: 90px; text-align: center; }
        .artist-item img { width: 85px; height: 85px; border-radius: 50%; object-fit: cover; border: 2px solid #282828; }
        .artist-name { font-size: 12px; margin-top: 8px; color: var(--gray); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .track-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .track-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* ЖИРНЫЙ ПЛЕЕР С ФИКСОМ ЗАКРЫТИЯ */
        #full-player { 
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; 
            z-index: 9000; transition: 0.45s cubic-bezier(0.19, 1, 0.22, 1); 
            padding: 20px 25px 50px; display: flex; flex-direction: column;
            touch-action: none; 
        }
        #full-player.open { top: 0; }
        
        .fp-header { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 60px; }
        .fp-close-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #1a1a1a; border-radius: 50%; font-size: 20px; }

        .fp-img { width: 90%; aspect-ratio: 1/1; border-radius: 25px; margin: 10px auto 25px; object-fit: cover; box-shadow: 0 15px 60px rgba(0,0,0,0.9); }
        .controls-area { margin-top: auto; padding-bottom: 100px; } 

        #queue-menu { position: absolute; bottom: -100%; left: 0; width: 100%; height: 80%; background: #0f0f0f; border-radius: 30px 30px 0 0; transition: 0.4s; z-index: 9500; padding: 30px; overflow-y: auto; border-top: 1px solid #333; touch-action: pan-y; }
        #queue-menu.open { bottom: 0; }
        .queue-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; }
        .queue-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; }

        #mini-player { position: fixed; bottom: 95px; left: 12px; right: 12px; height: 65px; background: rgba(25,25,25,0.98); backdrop-filter: blur(20px); border-radius: 15px; display: none; align-items: center; padding: 0 15px; z-index: 8000; border: 1px solid #333; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #mini-player img { width: 45px; height: 45px; border-radius: 8px; margin-right: 15px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.96); display: flex; justify-content: space-around; padding: 15px 0 38px; z-index: 7000; backdrop-filter: blur(25px); border-top: 1px solid #1a1a1a; }
        .nav-item { color: var(--gray); text-align: center; font-size: 12px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        #yt-engine { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-size: 65px; color: var(--accent); font-weight: 900; letter-spacing: -2px;">Notti</div>
    <div style="color: var(--gray); font-size: 16px; margin-top: -5px;">Premium Audio 2026</div>
    <button class="auth-btn" onclick="login()">НАЧАТЬ СЛУШАТЬ</button>
</div>

<div id="yt-engine"></div>

<div id="page-home" class="page active">
    <h2 style="font-size: 28px; margin-bottom: 20px;">Главная</h2>
    <div class="wave-card" onclick="search('RU Top Hits 2026', 'home-grid')">
        <i class="fas fa-bolt" style="font-size:35px; z-index:2;"></i>
        <div style="margin-left:20px; z-index:2;">
            <div style="font-weight:900; font-size:22px;">Микс 2026</div>
            <div style="font-size:12px; opacity:0.8;">Персонально для тебя • Notti AI</div>
        </div>
        <i class="fas fa-music wave-bg"></i>
    </div>
    
    <h3>Недавние артисты</h3>
    <div id="artists-list" class="artists-scroll"></div>
    
    <h3 style="margin-top:30px;">Хиты РУ 2026</h3>
    <div id="ru-hits" class="grid"></div>
    
    <h3>Мировые чарты</h3>
    <div id="home-grid" class="grid"></div>
</div>

<div id="page-search" class="page">
    <div style="position: sticky; top:0; background:#000; padding: 15px 0; z-index:100;">
        <div style="position: relative;">
            <i class="fas fa-search" style="position: absolute; left: 15px; top: 18px; color: var(--gray);"></i>
            <input type="text" id="searchInput" style="width:100%; padding:18px 18px 18px 45px; border-radius:15px; background:#1a1a1a; color:#fff; border:1px solid #333; outline:none; font-size: 16px;" placeholder="Поиск треков...">
        </div>
    </div>
    <div id="grid" class="grid" style="margin-top:10px;"></div>
</div>

<div id="page-favs" class="page">
    <h2 style="font-size: 28px;">Твоя медиатека</h2>
    <div id="fav-grid" class="grid"></div>
</div>

<div id="full-player">
    <div class="fp-header">
        <div class="fp-close-btn" onclick="closeFull()">
            <i class="fas fa-chevron-down"></i>
        </div>
        <div style="font-size: 12px; font-weight: bold; letter-spacing: 2px; color: var(--gray);">NOTTI PLAYER</div>
        <div class="fp-close-btn" onclick="toggleQueue()">
            <i class="fas fa-list-ul"></i>
        </div>
    </div>

    <img id="fp-img" class="fp-img" src="">
    
    <div class="controls-area">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div style="overflow:hidden; flex:1; margin-right: 20px;">
                <div id="fp-title" style="font-size:26px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                <div id="fp-artist" style="color:var(--gray); font-size:18px; margin-top:5px;"></div>
            </div>
            <i id="fp-like-main" class="far fa-heart" style="font-size:28px;" onclick="toggleCurrentFav()"></i>
        </div>

        <input type="range" id="seek" style="width:100%; accent-color:var(--accent); margin-top:40px;" value="0">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--gray); margin-top:10px; font-variant-numeric: tabular-nums;">
            <span id="curT">0:00</span><span id="durT">0:00</span>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:40px;">
            <i class="fas fa-random" style="font-size:22px; color:var(--gray);"></i>
            <i class="fas fa-step-backward" style="font-size:35px;" onclick="playPrev()"></i>
            <div style="width:85px; height:85px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px;" onclick="togglePlay()">
                <i id="fp-play" class="fas fa-play"></i>
            </div>
            <i class="fas fa-step-forward" style="font-size:35px;" onclick="playNext()"></i>
            <i class="fas fa-redo" style="font-size:22px; color:var(--gray);"></i>
        </div>
    </div>

    <div id="queue-menu">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="margin:0;">Далее в очереди</h2>
            <i class="fas fa-times-circle" style="font-size:24px; color:var(--gray);" onclick="toggleQueue()"></i>
        </div>
        <div id="queue-list"></div>
    </div>
</div>

<div id="mini-player" onclick="openFull()">
    <img id="m-img" src="">
    <div style="flex:1; overflow:hidden;"><div id="m-title" style="font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div></div>
    <i id="m-play" class="fas fa-play" style="padding:15px; font-size:18px;" onclick="event.stopPropagation(); togglePlay()"></i>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showP('home', this)"><i class="fas fa-home" style="font-size:22px;"></i><br><span style="margin-top:5px; display:inline-block;">Главная</span></div>
    <div class="nav-item" onclick="showP('search', this)"><i class="fas fa-search" style="font-size:22px;"></i><br><span style="margin-top:5px; display:inline-block;">Поиск</span></div>
    <div class="nav-item" onclick="showP('favs', this)"><i class="fas fa-heart" style="font-size:22px;"></i><br><span style="margin-top:5px; display:inline-block;">Лайки</span></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    
    let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'guest';
    const sKeyFavs = `notti_favs_${userId}`, sKeyHist = `notti_hist_${userId}`;
    
    let player, isPlaying = false, cur = null;
    let favs = JSON.parse(localStorage.getItem(sKeyFavs) || '[]');
    let history = JSON.parse(localStorage.getItem(sKeyHist) || '[]');
    let queue = [], historyQueue = [];

    function login() { 
        document.getElementById('auth-screen').style.display = 'none'; 
        tg.expand();
        tg.HapticFeedback.notificationOccurred('success');
        search('Русские хиты 2026', 'ru-hits');
        search('Global Trends 2026', 'home-grid');
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', {
            playerVars: { 'autoplay': 1, 'playsinline': 1, 'controls': 0, 'rel': 0 },
            events: { 
                'onStateChange': (e) => { 
                    if(e.data == YT.PlayerState.ENDED) playNext();
                    isPlaying = (e.data == YT.PlayerState.PLAYING);
                    updateBtns();
                },
                'onReady': () => setInterval(updateUI, 1000)
            }
        });
    }

    async function search(q, tid) {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&key=${KEY}&type=video&videoCategoryId=10&maxResults=15`);
            const data = await res.json();
            const g = document.getElementById(tid); if(!g) return;
            g.innerHTML = '';
            data.items.forEach(i => {
                const t = { id: i.id.videoId, title: i.snippet.title, art: i.snippet.channelTitle, img: i.snippet.thumbnails.high.url };
                g.innerHTML += `<div class="track-card" onclick="play('${t.id}','${t.title.replace(/'/g,"")}','${t.art}','${t.img}')">
                    <img src="${t.img}"><div style="padding:12px; font-size:12px; font-weight:600; line-height:1.3; height:45px; overflow:hidden;">${t.title}</div></div>`;
            });
            if(tid === 'grid') {
                queue = data.items.map(i => ({id: i.id.videoId, title: i.snippet.title, art: i.snippet.channelTitle, img: i.snippet.thumbnails.high.url}));
                renderQueue();
            }
        } catch(e) { console.error("API Error"); }
    }

    function play(id, title, art, img) {
        if(cur && cur.id !== id) historyQueue.push(cur);
        cur = {id, title, art, img};
        
        document.getElementById('mini-player').style.display = 'flex';
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = img;
        document.getElementById('fp-title').innerText = title;
        document.getElementById('fp-artist').innerText = art;
        document.getElementById('fp-img').src = img;
        
        player.loadVideoById(id);
        saveHistory(art, img);
        updateLikeBtn();
    }

    function togglePlay() { isPlaying ? player.pauseVideo() : player.playVideo(); }
    function updateBtns() {
        const icon = isPlaying ? 'fa-pause' : 'fa-play';
        document.getElementById('m-play').className = 'fas ' + icon;
        document.getElementById('fp-play').className = 'fas ' + icon;
    }

    function playNext() {
        if(queue.length > 0) {
            let next = queue.shift();
            play(next.id, next.title, next.art, next.img);
            renderQueue();
        } else { search(cur ? cur.art + " mix" : "Music 2026", 'home-grid'); }
        tg.HapticFeedback.impactOccurred('medium');
    }

    function playPrev() {
        if(historyQueue.length > 0) play(historyQueue.pop().id, "...", "...", "...");
        else player.seekTo(0);
        tg.HapticFeedback.impactOccurred('soft');
    }

    function updateUI() {
        if(player && player.getCurrentTime) {
            const c = player.getCurrentTime(), d = player.getDuration();
            const sk = document.getElementById('seek');
            sk.max = d || 100; sk.value = c;
            document.getElementById('curT').innerText = fmt(c);
            document.getElementById('durT').innerText = fmt(d);
        }
    }

    function fmt(s) { let m=Math.floor(s/60), r=Math.floor(s%60); return m+":"+(r<10?'0'+r:r); }

    function saveHistory(name, img) {
        history = history.filter(a => a.name !== name);
        history.unshift({name, img});
        localStorage.setItem(sKeyHist, JSON.stringify(history.slice(0,15)));
        renderArtists();
    }

    function renderArtists() {
        const l = document.getElementById('artists-list'); if(!l) return;
        l.innerHTML = '';
        history.forEach(a => {
            l.innerHTML += `<div class="artist-item" onclick="search('${a.name}','grid'); showP('search', document.querySelectorAll('.nav-item')[1])"><img src="${a.img}"><div class="artist-name">${a.name}</div></div>`;
        });
    }

    function updateLikeBtn() {
        const isF = favs.find(f => f.id === cur?.id);
        const btn = document.getElementById('fp-like-main');
        btn.className = isF ? 'fas fa-heart' : 'far fa-heart';
        btn.style.color = isF ? 'var(--accent)' : '#fff';
    }

    function toggleCurrentFav() {
        if(!cur) return;
        const idx = favs.findIndex(f => f.id === cur.id);
        if(idx > -1) favs.splice(idx,1); else favs.push(cur);
        localStorage.setItem(sKeyFavs, JSON.stringify(favs));
        updateLikeBtn();
        tg.HapticFeedback.impactOccurred('light');
    }

    function renderQueue() {
        const ql = document.getElementById('queue-list'); ql.innerHTML = '';
        queue.forEach((t, i) => {
            ql.innerHTML += `<div class="queue-item" onclick="play('${t.id}','${t.title}','${t.art}','${t.img}'); queue.splice(${i},1); renderQueue(); toggleQueue();">
                <img src="${t.img}"><div><div style="font-size:14px; font-weight:bold; width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">${t.title}</div><div style="font-size:11px; color:var(--gray);">${t.art}</div></div></div>`;
        });
    }

    function toggleQueue() { document.getElementById('queue-menu').classList.toggle('open'); }

    /* ФИКС ЖЕСТОВ И ЗАКРЫТИЯ */
    let startX = 0, startY = 0;
    const fp = document.getElementById('full-player');

    fp.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    }, {passive: false});

    fp.addEventListener('touchmove', e => {
        const dy = e.touches[0].clientY - startY;
        const dx = e.touches[0].clientX - startX;
        if (Math.abs(dy) > 10 || Math.abs(dx) > 10) e.preventDefault(); 
    }, {passive: false});

    fp.addEventListener('touchend', e => {
        let dx = e.changedTouches[0].clientX - startX;
        let dy = e.changedTouches[0].clientY - startY;
        if(Math.abs(dx) > Math.abs(dy)) {
            if(Math.abs(dx) > 80) dx > 0 ? playPrev() : playNext();
        } else {
            if(dy > 100) closeFull();
        }
    }, {passive: false});

    function openFull() { fp.classList.add('open'); }
    function closeFull() { fp.classList.remove('open'); document.getElementById('queue-menu').classList.remove('open'); }

    function showP(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(p==='favs') renderFavs();
    }

    function renderFavs() {
        const g = document.getElementById('fav-grid'); g.innerHTML = '';
        favs.forEach(t => {
            g.innerHTML += `<div class="track-card" onclick="play('${t.id}','${t.title}','${t.art}','${t.img}')">
                <img src="${t.img}"><div style="padding:10px; font-size:12px; font-weight:600;">${t.title}</div></div>`;
        });
    }

    document.getElementById('seek').oninput = function() { player.seekTo(this.value); };
    document.getElementById('searchInput').onkeypress = (e) => { if(e.key==='Enter') { search(e.target.value, 'grid'); e.target.blur(); } };
    window.onload = renderArtists;
</script>
</body>
</html>
