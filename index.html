<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notti Music AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #000; --card: #121212; --gray: #b3b3b3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }

        .page { display: none; height: 100vh; padding: 20px 20px 160px; overflow-y: auto; }
        .page.active { display: block; }

        /* Дизайн Радио (Моя волна) */
        .radio-wave { width: 100%; height: 150px; background: linear-gradient(45deg, #1db954, #191414); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; position: relative; overflow: hidden; cursor: pointer; }
        .radio-wave i { font-size: 50px; z-index: 2; }
        .wave-anim { position: absolute; width: 200%; height: 200%; background: rgba(255,255,255,0.1); border-radius: 40%; animation: wave 10s infinite linear; }
        @keyframes wave { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Плитки и Списки */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .track-card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        .track-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { color: var(--gray); text-align: center; font-size: 10px; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { color: #fff; opacity: 1; }

        /* Большой Плеер */
        #full-player { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; transition: 0.4s ease; padding: 40px 30px; display: flex; flex-direction: column; }
        #full-player.open { top: 0; }
        .fp-img { width: 100%; aspect-ratio: 1/1; border-radius: 20px; margin: 40px 0; object-fit: cover; }
        
        #yt-engine { position: absolute; top: -1000px; }
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 style="color: var(--accent); font-size: 45px;">Notti</h1>
    <button onclick="login()" style="padding:15px 40px; border-radius:30px; border:none; background:#fff; font-weight:bold;">Войти через Telegram</button>
</div>

<div id="yt-engine"></div>

<div id="page-home" class="page active">
    <div class="radio-wave" onclick="startRadio()">
        <div class="wave-anim"></div>
        <div style="text-align: center; z-index: 2;">
            <i class="fas fa-bolt"></i>
            <div style="font-weight: bold; margin-top: 10px;">МОЯ ВОЛНА</div>
        </div>
    </div>

    <h3 style="margin-bottom: 15px;">Микс по предпочтениям</h3>
    <div id="mix-grid" class="grid"></div>
</div>

<div id="page-search" class="page">
    <input type="text" id="searchInput" style="width:100%; padding:15px; border-radius:12px; background:#1c1c1e; color:#fff; border:none;" placeholder="Треки, артисты...">
    <div id="grid" class="grid" style="margin-top:20px;"></div>
</div>

<div id="page-favs" class="page">
    <h2>Любимое</h2>
    <div id="fav-grid" class="grid"></div>
</div>

<div id="full-player">
    <i class="fas fa-chevron-down" onclick="closeFull()" style="font-size: 24px;"></i>
    <img id="fp-img" class="fp-img" src="">
    <div id="fp-title" style="font-size: 24px; font-weight: bold;"></div>
    <div id="fp-artist" style="color: var(--gray); font-size: 18px;"></div>
    <input type="range" id="seek" style="width:100%; margin:30px 0;" value="0">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:30px;">
        <i class="fas fa-step-backward" style="font-size:30px;" onclick="player.seekTo(0)"></i>
        <div style="width:70px; height:70px; background:#fff; color:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;" onclick="togglePlay()">
            <i id="fp-play" class="fas fa-play"></i>
        </div>
        <i class="fas fa-step-forward" style="font-size:30px;" onclick="playNext()"></i>
    </div>
</div>

<div id="mini-player" style="position:fixed; bottom:90px; left:10px; right:10px; height:60px; background:#1c1c1e; border-radius:12px; display:none; align-items:center; padding:0 10px; z-index:2000; border:1px solid #333;" onclick="openFull()">
    <img id="m-img" style="width:40px; height:40px; border-radius:6px; margin-right:12px;">
    <div id="m-title" style="flex:1; font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
    <i id="m-play" class="fas fa-play" onclick="event.stopPropagation(); togglePlay()"></i>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showP('home', this)"><i class="fas fa-home"></i><br>Главная</div>
    <div class="nav-item" onclick="showP('search', this)"><i class="fas fa-search"></i><br>Поиск</div>
    <div class="nav-item" onclick="showP('favs', this)"><i class="fas fa-heart"></i><br>Любимое</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const KEY = 'AIzaSyBYuWcCFDO-FPZXhK-AnIxw7nLGeGzwSHw';
    let player, isPlaying = false, cur = null;
    
    // ДАННЫЕ ПОЛЬЗОВАТЕЛЯ
    let favs = JSON.parse(localStorage.getItem('notti_favs')||'[]');
    let history = JSON.parse(localStorage.getItem('notti_history')||'{}'); // { "ArtistName": count }

    function login() { 
        document.getElementById('auth-screen').style.display='none'; 
        updateMix();
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-engine', {
            events: { 'onStateChange': (e) => { if(e.data==0) playNext(); } }
        });
    }

    // АЛГОРИТМ "МОЯ ВОЛНА"
    async function startRadio() {
        tg.HapticFeedback.notificationOccurred('success');
        let seed = "Pop Music 2026";
        if(favs.length > 0) {
            const randomFav = favs[Math.floor(Math.random() * favs.length)];
            seed = randomFav.art + " official audio";
        }
        await search(seed, 'grid');
        showP('search', document.querySelectorAll('.nav-item')[1]);
        alert("Моя волна настроена под ваши вкусы!");
    }

    // АНАЛИТИКА ПРЕДПОЧТЕНИЙ
    function trackHistory(artist) {
        history[artist] = (history[artist] || 0) + 1;
        localStorage.setItem('notti_history', JSON.stringify(history));
        updateMix();
    }

    async function updateMix() {
        const sorted = Object.entries(history).sort((a,b) => b[1] - a[1]).slice(0, 4);
        const mixGrid = document.getElementById('mix-grid');
        mixGrid.innerHTML = '';
        if(sorted.length === 0) {
            mixGrid.innerHTML = '<p style="grid-column:1/3; opacity:0.5;">Слушайте больше, чтобы создать микс</p>';
            return;
        }
        for(let [artist] of sorted) {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(artist + ' official')}&key=${KEY}&type=video&maxResults=1`);
            const data = await res.json();
            if(data.items[0]) {
                const i = data.items[0];
                mixGrid.innerHTML += `<div class="track-card" onclick="play('${i.id.videoId}','${i.snippet.title.replace(/'/g,"")}','${i.snippet.channelTitle}','${i.snippet.thumbnails.high.url}')">
                    <img src="${i.snippet.thumbnails.high.url}"><div style="padding:10px; font-size:11px;">Микс: ${artist}</div></div>`;
            }
        }
    }

    async function search(q, target = 'grid') {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + ' music')}&key=${KEY}&type=video&videoCategoryId=10&maxResults=12`);
        const data = await res.json();
        render(data.items, target);
    }

    function render(items, tid) {
        const g = document.getElementById(tid); g.innerHTML = '';
        items.forEach(i => {
            const t = { id: i.id.videoId || i.id, title: i.snippet.title, art: i.snippet.channelTitle, img: i.snippet.thumbnails.high.url };
            g.innerHTML += `<div class="track-card" onclick="play('${t.id}','${t.title.replace(/'/g,"")}','${t.art}','${t.img}')">
                <img src="${t.img}"><div style="padding:10px; font-size:11px; font-weight:bold; height:36px; overflow:hidden;">${t.title}</div></div>`;
        });
    }

    function play(id, title, art, img) {
        cur = {id, title, art, img};
        trackHistory(art);
        document.getElementById('mini-player').style.display = 'flex';
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-img').src = img;
        document.getElementById('fp-title').innerText = title;
        document.getElementById('fp-artist').innerText = art;
        document.getElementById('fp-img').src = img;
        player.loadVideoById(id); isPlaying = true; updateBtns();
    }

    function togglePlay() { if(isPlaying) player.pauseVideo(); else player.playVideo(); isPlaying=!isPlaying; updateBtns(); }
    function updateBtns() { const i = isPlaying ? 'fa-pause' : 'fa-play'; document.getElementById('m-play').className = 'fas '+i; document.getElementById('fp-play').className = 'fas '+i; }
    function playNext() { if(cur) search(cur.art + " official"); }

    function showP(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(p==='favs') render(favs.map(f => ({id: f.id, snippet: {title: f.title, channelTitle: f.art, thumbnails: {high: {url: f.img}}}})), 'fav-grid');
    }

    function openFull() { document.getElementById('full-player').classList.add('open'); }
    function closeFull() { document.getElementById('full-player').classList.remove('open'); }

    document.getElementById('searchInput').onkeypress = (e) => { if(e.key==='Enter') { search(e.target.value); e.target.blur(); } };
    window.onload = () => { tg.expand(); search('Pop 2026'); };
</script>
</body>
</html>
