<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Notti Cloud Music</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --spotify-green: #1DB954; --bg-black: #121212; --card-grey: #181818; --text-grey: #b3b3b3; }
        body { background-color: var(--bg-black); color: white; font-family: sans-serif; margin: 0; padding-bottom: 110px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        
        /* Источники */
        .sources { display: flex; gap: 10px; margin-bottom: 15px; }
        .source-badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; background: #333; cursor: pointer; }
        .source-badge.active { background: var(--spotify-green); color: black; font-weight: bold; }

        .search-box { background: white; border-radius: 8px; padding: 10px; display: flex; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; }

        .track-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #282828; cursor: pointer; }
        .track-item img { width: 45px; height: 45px; border-radius: 4px; margin-right: 12px; }
        .track-info { flex-grow: 1; }
        .track-source-icon { font-size: 14px; margin-right: 8px; }

        /* Навигация и Плеер */
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        nav a { color: var(--text-grey); text-decoration: none; text-align: center; font-size: 10px; }
        nav a.active { color: white; }
        nav a i { font-size: 20px; display: block; margin-bottom: 4px; }

        .mini-player { position: fixed; bottom: 65px; left: 10px; right: 10px; background: #282828; border-radius: 8px; padding: 10px; display: flex; align-items: center; }
        #yt-player { display: none; } /* Скрываем видео, оставляем только звук */
    </style>
</head>
<body>

<div id="yt-player"></div>

<div id="search" class="page active-page">
    <div class="sources">
        <div class="source-badge active" onclick="setSource('yt', this)"><i class="fab fa-youtube"></i> YouTube</div>
        <div class="source-badge" onclick="setSource('sc', this)"><i class="fab fa-soundcloud"></i> SoundCloud</div>
        <div class="source-badge" onclick="setSource('sp', this)"><i class="fab fa-spotify"></i> Spotify</div>
    </div>
    <div class="search-box">
        <i class="fas fa-search" style="color: #000;"></i>
        <input type="text" id="search-input" placeholder="Поиск музыки...">
    </div>
    <div id="search-results" style="margin-top: 20px;"></div>
</div>

<div id="home" class="page">
    <h1>Моя медиатека</h1>
    <div id="playlists-container"></div>
</div>

<div class="mini-player">
    <div id="player-info" style="flex-grow: 1;">
        <div id="player-title" style="font-size: 14px; font-weight: bold;">Не выбрано</div>
        <div id="player-artist" style="font-size: 12px; color: var(--text-grey);">Выберите источник и трек</div>
    </div>
    <button id="play-pause" onclick="togglePlay()" style="background: none; border: none; color: white; font-size: 24px;">
        <i class="fas fa-play"></i>
    </button>
</div>

<nav>
    <a href="javascript:void(0)" onclick="showPage('home', this)"><i class="fas fa-home"></i>Главная</a>
    <a href="javascript:void(0)" onclick="showPage('search', this)" class="active"><i class="fas fa-search"></i>Поиск</a>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let player;
    let currentSource = 'yt';

    // Инициализация YouTube API
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0',
            videoId: '',
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    function setSource(src, el) {
        currentSource = src;
        document.querySelectorAll('.source-badge').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
    }

    // Для демонстрации: поиск имитирует разные источники
    const searchInput = document.getElementById('search-input');
    const resultsCont = document.getElementById('search-results');

    searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            searchMusic(this.value);
        }
    });

    function searchMusic(query) {
        resultsCont.innerHTML = '<p>Поиск в ' + currentSource.toUpperCase() + '...</p>';
        
        // В реальности здесь будет fetch к вашему бэкенду или API
        // Демо-данные:
        const results = [
            { id: 'dQw4w9WgXcQ', title: query + ' (Radio Edit)', artist: 'Notti Artist', img: 'https://via.placeholder.com/45/1DB954' },
            { id: '3f-X2E0Vp_4', title: query + ' Remix', artist: 'Cloud DJ', img: 'https://via.placeholder.com/45/ff5500' }
        ];

        setTimeout(() => {
            resultsCont.innerHTML = '';
            results.forEach(track => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <img src="${track.img}">
                    <div class="track-info">
                        <div class="track-name">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <i class="fas fa-play" style="color: var(--spotify-green)"></i>
                `;
                item.onclick = () => playTrack(track.id, track.title, track.artist);
                resultsCont.appendChild(item);
            });
        }, 800);
    }

    function playTrack(id, title, artist) {
        document.getElementById('player-title').innerText = title;
        document.getElementById('player-artist').innerText = artist;
        
        if (currentSource === 'yt' || currentSource === 'sp') {
            player.loadVideoById(id);
            player.playVideo();
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-pause"></i>';
        }
    }

    function togglePlay() {
        const state = player.getPlayerState();
        if (state === 1) {
            player.pauseVideo();
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-play"></i>';
        } else {
            player.playVideo();
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-pause"></i>';
        }
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-play"></i>';
        }
    }
</script>
</body>
</html>
